services:
  db:
    image: postgres:16-alpine
    container_name: projeto_cursos_db
    environment:
      POSTGRES_DB: ${PGDATABASE:-mentoria_dev}
      POSTGRES_USER: ${PGUSER:-postgres}
      POSTGRES_PASSWORD: ${PGPASSWORD:-postgres}
    ports:
      - "${PGPORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-postgres} -d ${PGDATABASE:-mentoria_dev}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
